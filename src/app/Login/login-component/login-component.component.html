
<div class="container vh-100 d-flex align-items-center">
    <div class="row w-100 align-items-center">

        <div class="col-lg-6 d-none d-lg-block pe-5">
            <h1 class="display-4 fw-bold mb-4">Acceso a tu futuro financiero</h1>
            <p class="fs-5 mb-5 opacity-75">Únete a miles de emprendedores...</p>

            <div class="mb-3 d-flex align-items-center">
                <span class="badge-number me-3">1</span>
                <div>
                    <h6 class="fw-bold mb-0">Seguridad garantizada</h6>
                </div>
            </div>
        </div>

        <div class="col-lg-5 offset-lg-1">
            <div class="card login-card shadow-lg">
                <div class="card-body p-4 p-md-5">

                    <div class="d-flex justify-content-end mb-3">
                        <button (click)="toggleTheme()" class="btn btn-link text-decoration-none p-0"
                            style="color: var(--muted-text)">
                            <i [class]="isDarkMode ? 'fas fa-sun text-warning' : 'fas fa-moon'"></i>
                            <span class="ms-2 small">Modo {{ isDarkMode ? 'Claro' : 'Oscuro' }}</span>
                        </button>
                    </div>

                    <h2 class="fw-bold">Inicia sesión</h2>
                    <p class="small mb-4" style="color: var(--muted-text)">Accede a tu cuenta y continúa creciendo</p>

                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Correo electrónico</label>
                            <input type="email" class="form-control custom-input" placeholder="tu@email.com">
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label small fw-bold">Contraseña</label>
                                <a href="#" class="small text-danger text-decoration-none">¿Olvidaste?</a>
                            </div>
                            <input type="password" class="form-control custom-input" placeholder="••••••••">
                        </div>

                        <button class="btn btn-danger w-100 py-3 fw-bold shadow-0 mb-4">
                            Acceder <i class="fas fa-arrow-right ms-2"></i>
                        </button>

                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn btn-outline-custom w-100 small">Google</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-custom w-100 small">Apple</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>

    </div>
</div>
